# forty-two-watts config example
# Copy to config.yaml and edit for your site.

site:
  name: "Home"
  control_interval_s: 5
  grid_target_w: 0              # 0 = self-consumption
  grid_tolerance_w: 42          # deadband (The Answer)
  watchdog_timeout_s: 60
  smoothing_alpha: 0.3
  slew_rate_w: 500
  min_dispatch_interval_s: 5

fuse:
  max_amps: 16
  phases: 3
  voltage: 230

# ----------------------------------------------------------------------
# Drivers — Lua scripts with per-driver capabilities.
# Capabilities are the ONLY way the sandbox talks to the outside world.
# A driver with only mqtt capability can't touch modbus, and vice versa.
# ----------------------------------------------------------------------
drivers:
  - name: ferroamp
    lua: drivers/ferroamp.lua
    is_site_meter: true              # exactly one driver must have this
    battery_capacity_wh: 15200
    capabilities:
      mqtt:
        host: 192.168.1.153
        port: 1883
        username: extapi
        password: ferroampExtApi

  - name: sungrow
    lua: drivers/sungrow.lua
    battery_capacity_wh: 9600
    capabilities:
      modbus:
        host: 192.168.1.10
        port: 502
        unit_id: 1

api:
  port: 8080

# Home Assistant MQTT bridge (optional)
homeassistant:
  enabled: false
  broker: 192.168.1.1
  port: 1883
  username: homeems
  password: homeems
  publish_interval_s: 5

# Persistent state (SQLite)
state:
  path: state.db

# Push notifications (optional — ntfy transport)
notifications:
  enabled: false
  provider: ntfy
  ntfy:
    server: https://ntfy.sh
    topic: forty-two-watts
  events:
    - type: driver_offline
      enabled: false
      threshold_s: 600
      priority: 4
      cooldown_s: 3600
    - type: driver_recovered
      enabled: false
      priority: 3
      cooldown_s: 0
    - type: update_available
      enabled: false
      priority: 3
      cooldown_s: 3600
    - type: fuse_over_limit
      enabled: false
      threshold_s: 30
      priority: 5
      cooldown_s: 900
    - type: ev_surplus_starved
      enabled: false
      priority: 3
      cooldown_s: 3600
