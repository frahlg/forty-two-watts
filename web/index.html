<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forty-two-watts</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>forty-two-watts 🐬</h1>
    <div class="header-right">
      <span id="version" class="version">v0.1.0</span>
      <span id="conn-status" class="conn-status connected" title="Connected">&#9679;</span>
    </div>
  </header>

  <main>
    <!-- Summary Cards — compact 5-in-a-row -->
    <section class="summary-cards">
      <div class="card summary-card" id="card-grid">
        <div class="card-label">Grid</div>
        <div class="card-value" id="grid-w">-- W</div>
        <div class="card-sub" id="grid-dir">--</div>
      </div>
      <div class="card summary-card" id="card-pv">
        <div class="card-label">PV</div>
        <div class="card-value" id="pv-w">-- W</div>
        <div class="card-sub">gen</div>
      </div>
      <div class="card summary-card" id="card-bat">
        <div class="card-label">Battery</div>
        <div class="card-value" id="bat-w">-- W</div>
        <div class="card-sub" id="bat-dir">--</div>
      </div>
      <div class="card summary-card" id="card-load">
        <div class="card-label">Load</div>
        <div class="card-value val-neutral" id="load-w">-- W</div>
        <div class="card-sub">house</div>
      </div>
      <div class="card summary-card" id="card-soc">
        <div class="card-label">SoC</div>
        <div class="card-value" id="bat-soc">-- %</div>
        <div class="soc-bar"><div class="soc-fill" id="soc-fill"></div></div>
      </div>
      <div class="card summary-card" id="card-fuse">
        <div class="card-label">Fuse</div>
        <div class="card-value" id="fuse-use">-- A</div>
        <div class="fuse-bar"><div class="fuse-fill" id="fuse-fill"></div></div>
      </div>
    </section>

    <!-- Controls — compact single row -->
    <section class="controls-row">
      <div class="card control-card">
        <div class="card-label">Mode</div>
        <div class="mode-buttons" id="mode-buttons">
          <button data-mode="idle">Idle</button>
          <button data-mode="self_consumption">Self</button>
          <button data-mode="peak_shaving">Peak</button>
          <button data-mode="charge">Charge</button>
          <button data-mode="priority">Prio</button>
          <button data-mode="weighted">Weighted</button>
        </div>
      </div>
      <div class="card control-card">
        <div class="card-label" id="target-label">Grid Target</div>
        <div class="slider-group-compact">
          <input type="range" id="grid-target-slider" min="-5000" max="5000" step="50" value="0">
          <span id="grid-target-value" class="slider-current">0 W</span>
          <button id="grid-target-send" class="btn-send">Set</button>
        </div>
      </div>
      <div class="card control-card">
        <div class="card-label">Peak Limit</div>
        <div class="slider-group-compact">
          <input type="range" id="peak-limit-slider" min="0" max="11000" step="100" value="5000">
          <span id="peak-limit-value" class="slider-current">5000 W</span>
          <button id="peak-limit-send" class="btn-send">Set</button>
        </div>
      </div>
      <div class="card control-card">
        <div class="card-label">EV Charging ⚡</div>
        <div class="slider-group-compact">
          <input type="range" id="ev-slider" min="0" max="22000" step="100" value="0">
          <span id="ev-value" class="slider-current">0 W</span>
          <button id="ev-send" class="btn-send">Set</button>
        </div>
      </div>
    </section>

    <!-- Power Chart -->
    <section id="chart-section">
      <div class="chart-header">
        <h2>Power</h2>
        <div class="range-buttons" id="range-buttons">
          <button data-range="5m" class="active">5m</button>
          <button data-range="15m">15m</button>
          <button data-range="1h">1h</button>
          <button data-range="6h">6h</button>
          <button data-range="24h">24h</button>
          <button data-range="3d">3d</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="power-chart" width="800" height="220"></canvas>
      </div>
      <div class="chart-legend" id="chart-legend">
        <span class="legend-item"><span class="legend-color" style="background:#ef4444"></span> Grid</span>
        <span class="legend-item"><span class="legend-color" style="background:#22c55e"></span> PV</span>
        <span class="legend-item"><span class="legend-color" style="background:#e2e8f0"></span> Load</span>
        <span class="legend-item"><span class="legend-color" style="background:#f59e0b"></span> Ferroamp</span>
        <span class="legend-item"><span class="legend-color" style="background:#8b5cf6"></span> Sungrow</span>
      </div>
    </section>

    <!-- Drivers — compact -->
    <section id="drivers-section">
      <div class="drivers-grid" id="drivers-grid"></div>
    </section>
  </main>

  <footer>
    <span id="refresh-indicator" class="refresh-dot" title="Auto-refresh active">&#9679;</span>
    <span id="last-update">Last update: --</span>
    <span class="footer-tagline">Don't Panic 🐬</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
